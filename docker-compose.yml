services:
  app:
    build: .
    container_name: miaoji
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3080}:80"
    env_file: .env
    environment:
      # Database URL auto-constructed from postgres service credentials
      - DATABASE_URL=postgresql://${POSTGRES_USER:-miaoji}:${POSTGRES_PASSWORD:-miaoji_secret}@postgres:5432/${POSTGRES_DB:-miaoji}?schema=public
      - PORT=5001
      - NODE_ENV=production
    volumes:
      - miaoji_uploads:/app/server/uploads
      # Mount prompts so you can edit them without rebuilding
      - ./server/src/prompts:/app/server/dist/prompts
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: miaoji-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miaoji}
      POSTGRES_USER: ${POSTGRES_USER:-miaoji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miaoji_secret}
    volumes:
      - miaoji_pgdata:/var/lib/postgresql/data
    # Uncomment to expose DB port for external tools (e.g. pgAdmin, DBeaver)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miaoji}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  miaoji_pgdata:
  miaoji_uploads:
